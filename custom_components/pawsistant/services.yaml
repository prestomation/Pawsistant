log_event:
  name: Log Event
  description: >
    Log a pet activity event. The event is stored locally
    and triggers an immediate sensor update.
  fields:
    dog:
      name: Pet
      description: The name of the pet (case-insensitive).
      required: true
      selector:
        text:
    event_type:
      name: Event Type
      description: The type of event to log.
      required: true
      selector:
        select:
          options:
            - food
            - treat
            - water
            - walk
            - pee
            - poop
            - medicine
            - weight
            - vaccine
            - sleep
            - grooming
            - training
            - teeth_brushing
            - sick
    note:
      name: Note
      description: >
        Optional note for the event (e.g. medicine name, vet comments).
      required: false
      selector:
        text:
    value:
      name: Value
      description: Optional numeric value (e.g. weight in lbs).
      required: false
      selector:
        number:
          mode: box
    timestamp:
      name: Timestamp
      description: >
        Optional ISO 8601 timestamp override (e.g. "2026-03-18T10:30:00-04:00").
        Defaults to now if omitted.
      required: false
      selector:
        text:

delete_event:
  name: Delete Event
  description: >
    Delete a previously logged event by its unique ID. The event_id is
    available as an attribute on most-recent-event sensors.
  fields:
    event_id:
      name: Event ID
      description: The UUID of the event to delete.
      required: true
      selector:
        text:

add_dog:
  name: Add Pet
  description: >
    Register a new pet. A new set of sensors will appear after HA reloads
    the integration (or after the next coordinator refresh).
  fields:
    name:
      name: Name
      description: The pet's name (must be unique).
      required: true
      selector:
        text:
    breed:
      name: Breed
      description: Optional breed.
      required: false
      selector:
        text:
    birth_date:
      name: Birth Date
      description: Optional birth date (YYYY-MM-DD).
      required: false
      selector:
        text:
    species:
      name: Animal type
      description: Type of animal (e.g. Dog, Cat, Rabbit). Defaults to Dog.
      required: false
      selector:
        text:

remove_dog:
  name: Remove Pet
  description: >
    Remove a pet and permanently delete all of its events.
    This action cannot be undone.
  fields:
    dog:
      name: Pet
      description: The name of the pet to remove (case-insensitive).
      required: true
      selector:
        text:

list_events:
  name: List Events
  description: >
    Query events for a pet and return the results via service response
    (`response_variable`). Use this in automations to inspect recent activity.
  fields:
    dog:
      name: Pet
      description: The name of the pet.
      required: true
      selector:
        text:
    event_type:
      name: Event Type
      description: Filter by event type (optional).
      required: false
      selector:
        select:
          options:
            - food
            - treat
            - water
            - walk
            - pee
            - poop
            - medicine
            - weight
            - vaccine
            - sleep
            - grooming
            - training
            - teeth_brushing
            - sick
    days:
      name: Days
      description: How many days back to search (default 7, max 3650).
      required: false
      selector:
        number:
          min: 1
          max: 3650
          mode: box

import_events:
  name: Import Events
  description: >
    Bulk-import events from an external JSON array. Intended for one-time
    migration from the Firebase-backed version of DogLog. Events whose `id`
    already exists in the local store are skipped.
  fields:
    events:
      name: Events
      description: >
        A JSON array of event objects. Each object should have at minimum:
        dog_id, event_type, timestamp. An `id` field is optional — one will
        be generated if absent.
      required: true
      selector:
        object:

update_event_type:
  name: Update Event Type
  description: >
    Update the display name, icon, color, or button metric for an existing
    event type. Only the fields you provide are changed — omitted fields
    are left untouched. Built-in and custom types can both be updated.
    The sensor immediately reflects the changes after the call.
  fields:
    event_type:
      name: Event type key
      description: The event type key to update (e.g. walk, food, my_custom_type).
      required: true
      selector:
        text:
    name:
      name: Display name
      description: New display name for the event type.
      required: false
      selector:
        text:
    icon:
      name: Icon
      description: >
        New icon in mdi: format (e.g. mdi:walk, mdi:bowl). Browse icons at
        https://pictogrammers.com/library/mdi/
      required: false
      selector:
        text:
    color:
      name: Color
      description: >
        New hex color (e.g. #4CAF50). Must be a 6-digit hex color.
      required: false
      selector:
        text:
    metric:
      name: Button metric
      description: >
        What to show on the sensor button. Options: daily_count (N today),
        days_since (N days), last_value (value from most recent event),
        hours_since (N hours). Default if omitted is daily_count.
      required: false
      selector:
        select:
          options:
            - daily_count
            - days_since
            - last_value
            - hours_since

add_event_type:
  name: Add Event Type
  description: >
    Add a new custom event type. Built-in types (food, walk, etc.) cannot
    be recreated — use update_event_type to modify them instead. After adding,
    a new button appears in the card automatically.
  fields:
    event_type:
      name: Event type key
      description: >
        Unique lowercase ID using only a-z, 0-9, and underscores. Max 30 chars.
        Example: outdoor_walk or vet_checkup.
      required: true
      selector:
        text:
    name:
      name: Display name
      description: Human-readable name shown on the card button.
      required: true
      selector:
        text:
    icon:
      name: Icon
      description: >
        MDI icon in mdi: format (e.g. mdi:walk). Browse icons at
        https://pictogrammers.com/library/mdi/
      required: true
      selector:
        text:
    color:
      name: Color
      description: >
        Hex color (e.g. #4CAF50). Must be a 6-digit hex color starting with #.
      required: true
      selector:
        text:
    metric:
      name: Button metric
      description: >
        What to show on the sensor button. Options: daily_count (N today),
        days_since (N days), last_value (value from most recent event),
        hours_since (N hours). Defaults to daily_count if omitted.
      required: false
      selector:
        select:
          options:
            - daily_count
            - days_since
            - last_value
            - hours_since

delete_event_type:
  name: Delete Event Type
  description: >
    Permanently delete a custom event type. Built-in types (food, walk, etc.)
    cannot be deleted — use update_event_type to modify them instead.
    Events already logged with this type are preserved in the database.
  fields:
    event_type:
      name: Event type key
      description: The event type key to delete (e.g. my_custom_type).
      required: true
      selector:
        text:

set_shown_types:
  name: Set Shown Types
  description: >
    Set the visible event type buttons (and their order) for a specific dog.
    Changes persist server-side so they sync across all devices and dashboards.
  fields:
    dog:
      name: Dog
      description: The name of the dog to configure.
      required: true
      selector:
        text:
    shown_types:
      name: Shown types
      description: Ordered list of event type keys to show as buttons.
      required: false
      selector:
        object:
