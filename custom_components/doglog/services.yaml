log_event:
  name: Log Event
  description: Log a pet activity event to DogLog.
  fields:
    dog:
      name: Dog
      description: The name of the dog.
      required: true
      selector:
        text:
    event_type:
      name: Event Type
      description: The type of event to log.
      required: true
      selector:
        select:
          options:
            - food
            - treat
            - walk
            - pee
            - poop
            - teeth_brushing
            - grooming
            - training
            - medicine
            - weight
            - temperature
            - water
            - sleep
            - vaccine
            - blood_glucose
    note:
      name: Note
      description: Optional note for the event.
      required: false
      selector:
        text:
    value:
      name: Value
      description: Optional numeric value (e.g., weight in lbs).
      required: false
      selector:
        number:
          mode: box
