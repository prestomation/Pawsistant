name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract version from tag
        id: version
        run: echo "version=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT

      - name: Bump version in manifest and card
        run: |
          VERSION=${{ steps.version.outputs.version }}

          # Update manifest.json
          python3 -c "
          import json
          with open('custom_components/pawsistant/manifest.json') as f:
              data = json.load(f)
          data['version'] = '${VERSION}'
          with open('custom_components/pawsistant/manifest.json', 'w') as f:
              json.dump(data, f, indent=2)
              f.write('\n')
          "

          # Update card JS version comment
          sed -i "s/^ \* Version: .*/ * Version: ${VERSION}/" custom_components/pawsistant/frontend/pawsistant-card.js

      - name: Commit version bump
        run: |
          VERSION=${{ steps.version.outputs.version }}
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add custom_components/pawsistant/manifest.json custom_components/pawsistant/frontend/pawsistant-card.js
          # Only commit if there are changes
          if git diff --cached --quiet; then
            echo "Version already up to date"
          else
            git commit -m "Bump version to ${VERSION} [skip ci]"
            git push origin main
          fi

      - name: Extract changelog for this version
        id: changelog
        run: |
          VERSION=${{ steps.version.outputs.version }}
          # Extract the section for this version from CHANGELOG.md
          awk "/^## \\[$VERSION\\]/,/^## \\[/{if(/^## \\[$VERSION\\]/)found=1; else if(/^## \\[/ && found)exit; if(found)print}" CHANGELOG.md > release_notes.txt
          # If no changelog entry found, use a default message
          if [ ! -s release_notes.txt ]; then
            echo "Release v${VERSION}" > release_notes.txt
          fi
          echo 'notes<<EOF' >> $GITHUB_OUTPUT
          cat release_notes.txt >> $GITHUB_OUTPUT
          echo 'EOF' >> $GITHUB_OUTPUT

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "v${{ steps.version.outputs.version }}"
          body: ${{ steps.changelog.outputs.notes }}
          draft: false
          prerelease: false
