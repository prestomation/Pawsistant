name: Validate

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install frontend test deps
        run: npm ci

      - name: Run frontend tests
        run: npx vitest run --reporter=verbose

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install pytest pytest-homeassistant-custom-component

      - name: Compile check
        run: |
          find custom_components -name "*.py" -exec python -m py_compile {} +

      - name: Run tests
        run: |
          # Run real-HA tests first (before any mock contamination)
          python -m pytest tests/test_sensor_utils.py -v
          # Run all remaining tests (use HA mocks)
          python -m pytest tests/ -v --ignore=tests/integration --ignore=tests/test_sensor_utils.py

      - name: Run hassfest
        uses: "home-assistant/actions/hassfest@master"
