name: Validate

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install root test deps
        run: npm ci

      - name: Build card JS (from source modules)
        working-directory: custom_components/pawsistant/frontend
        run: |
          npm ci
          npm run build

      - name: Check committed build matches source
        run: |
          cd custom_components/pawsistant/frontend
          # Strip the build date line (changes every build) before comparing
          grep -v 'Built:' pawsistant-card.js > /tmp/built.js
          grep -v 'Built:' <(git show HEAD:custom_components/pawsistant/frontend/pawsistant-card.js 2>/dev/null || echo '') > /tmp/committed.js || true
          # Only fail if committed file exists and differs
          if [ -s /tmp/committed.js ]; then
            if ! diff -q /tmp/built.js /tmp/committed.js > /dev/null 2>&1; then
              echo "WARNING: pawsistant-card.js is out of date. Run 'npm run build' and commit the result."
            fi
          fi

      - name: Run frontend tests
        run: npx vitest run --reporter=verbose

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install pytest pytest-homeassistant-custom-component

      - name: Compile check
        run: |
          find custom_components -name "*.py" -exec python -m py_compile {} +

      - name: Run tests
        run: |
          # Run real-HA tests first (before any mock contamination)
          python -m pytest tests/test_sensor_utils.py -v
          # Run all remaining tests (use HA mocks)
          python -m pytest tests/ -v --ignore=tests/integration --ignore=tests/test_sensor_utils.py

      - name: Run hassfest
        uses: "home-assistant/actions/hassfest@master"